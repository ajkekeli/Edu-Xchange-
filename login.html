<!DOCTYPE html>
<html>
  <head>
    <title>Log In</title>
    <link rel="stylesheet" href="static/signin.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="static/graduation-hat.png" type="image/x-icon" />
    <meta http-equiv="X-UA-Compatible" content="IE=7" />
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
  </head>
  <body>
    
    </header>
    <h1 class="headline">
      🎓 <strong><span>Edu</span></strong
      >Xchange
    </h1>
    <div class="container">
      <h1 class="login-header">Log In</h1>
      <label for="login-username">Username</label>
      <input id="login-username" type="text" /><br />
      <label for="login-password">Password</label>
      <input id="login-password" type="password" /><br />
      <button onclick="login()">Log In</button>
      <p>Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
     <a href="index.html" style="color: aliceblue;">Back To Homepage</a>
    <script>
      async function login() {
        const username = document.getElementById("login-username").value.trim();
        const password = document.getElementById("login-password").value;

        if (!username || !password) {
          alert("Enter both username and password");
          return;
        }

        const res = await fetch("api/login.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();
        if (data.status === "success") {
          window.location.href = "forum.html";
        } else {
          alert("Invalid username or password");
        }
      }

      // Fade in when the page loads
      document.body.classList.add("fade-in");

      // Intercept all internal links for fade-out transition
      document.querySelectorAll("a[href]").forEach((link) => {
        const url = link.getAttribute("href");
        if (!url.startsWith("http")) {
          link.addEventListener("click", function (e) {
            e.preventDefault();
            document.body.classList.remove("fade-in");
            document.body.classList.add("fade-out");
            setTimeout(() => {
              window.location.href = url;
            }, 300); // Delay should match fadeOut animation
          });
        }
      });
    </script>
  </body>
</html>
