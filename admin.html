<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | EduXchange</title>
    <link rel="stylesheet" href="static/admin.css" />
  </head>
  <body>
    <header>
      <a href="forum.html" style="color: whitesmoke;text-decoration: none; size: 300px;">🔙Back</a>
      <h1>🎓 EduXchange Admin Dashboard</h1>
      <button onclick="logout()">Logout</button>
    </header>

    <main>
      <section>
        <h2>📊 Stats Overview</h2>
        <div id="stats"></div>
      </section>

      <section>
        <h2>👥 Users</h2>
        <div id="users"></div>
      </section>

      <section>
        <h2>❓ Questions</h2>
        <div id="questions"></div>
      </section>

      <section>
        <h2>📑 Resources</h2>
        <div id="resources"></div>
      </section>

      <section>
        <h2>🆘 Help Requests</h2>
        <div id="helps"></div>
      </section>
    </main>

    <script src="static/admin.js"></script>
    <script>
      fetch("api/session.php")
        .then((res) => res.json())
        .then((data) => {
          if (!data.logged_in || !data.is_admin) {
            window.location.href = "login.html"; // Only admins allowed
          }
        });
    </script>
  </body>
</html>
